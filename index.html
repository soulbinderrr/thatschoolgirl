function startFightGame(callback) {
    const vnAct4 = document.getElementById("vnAct4");
    vnAct4.style.filter = "brightness(0.5)";
    
    const game = document.createElement("div"); game.className = "fight-game"; game.id = "fightGame";
    game.style.background = "rgba(0,0,0,0.6)";
    game.innerHTML = `<div class="fight-hint" id="fightHint">Бывший атакует!</div>
    <div class="fight-bar"><div class="fight-zone" id="fightZone"></div><div class="fight-indicator" id="fightIndicator"></div></div>`;
    document.body.appendChild(game);
    
    setTimeout(() => {
        const indicator = document.getElementById("fightIndicator"), 
              zone = document.getElementById("fightZone"),
              hint = document.getElementById("fightHint");
        if(!indicator||!zone) return;
        
        let zoneLeft = 45, zoneWidth = 30, speed = 1.5;
        zone.style.left = zoneLeft + "%"; zone.style.width = zoneWidth + "%";
        
        let position = 0, direction = 1, gameActive = true, round = 1;
        
        const interval = setInterval(() => {
            if (!gameActive) return;
            position += direction * speed;
            if (position >= 100) direction = -1;
            if (position <= 0) direction = 1;
            indicator.style.left = position + "%";
        }, 30);
        
        game.addEventListener("click", function handler() {
            if (!gameActive) return;
            const hit = position >= zoneLeft && position <= (zoneLeft + zoneWidth);
            
            if (round === 1) {
                if (!hit) {
                    gameActive = false; clearInterval(interval);
                    game.removeEventListener("click", handler);
                    game.innerHTML = `<div class="fight-result" style="color:#ff4444">💥 Удар! Бывший попал тебе в лицо.</div>`;
                    setTimeout(() => { game.remove(); vnAct4.style.filter = ""; callback(false); }, 2000);
                    return;
                }
                round = 2;
                hint.innerText = "Ответный удар!";
                zoneLeft = 40; zoneWidth = 23; speed = 2.25;
                zone.style.left = zoneLeft + "%"; zone.style.width = zoneWidth + "%";
                position = 0; direction = 1;
            } else {
                gameActive = false; clearInterval(interval);
                game.removeEventListener("click", handler);
                if (hit) {
                    game.innerHTML = `<div class="fight-result" style="color:#2ecc40">👊 Ты попал! Бывший отступает.</div>`;
                } else {
                    game.innerHTML = `<div class="fight-result" style="color:#ff4444">😞 Промах! Бывший ухмыляется.</div>`;
                }
                setTimeout(() => { 
                    game.remove(); 
                    vnAct4.style.filter = "";
                    if (hit) document.getElementById("charEx").className = "vn-char ex hidden";
                    callback(hit); 
                }, 2000);
            }
        });
    }, 100);
}

async function loadAct4Scene(sceneId) {

    if (!scene) return;
    
    if (scene.isFight) {

        return;
    }
    
    if (scene.dynamic) {
        if (scene.delta) { relation += scene.delta(); updateRelationBadge(); saveGame(); }
        loadAct4Scene("A4-THANKS");
        return;
    }
    
    if (scene.text) showAct4Dialogue(scene.speaker, scene.text, scene.active);
    
    if (scene.choices) {
        const choices = typeof scene.choices === "function" ? scene.choices() : scene.choices;
        const container = document.getElementById("vnAct4Choices");
        if (container.children.length === 0) {
            if (scene.text) await waitForClick();
            showAct4Choices(choices);
        }
        return;
    }
    
if (scene.isEnd) {
    console.log("A4-END reached, calling endAct4");
    if (scene.dynamicEnd) {
        const won = window._fightResult;
        console.log("fightResult:", won, "relation:", relation);
        if (won && relation >= 4) {
            showAct4Dialogue("Алиса", "Ты цел! Я так переживала! *Алиса крепко обнимает тебя*", "alice");
        } else if (relation >= 1) {
            showAct4Dialogue("Алиса", "Спасибо тебе огромное. Ты настоящий друг.", "alice");
        } else {
            showAct4Dialogue("Алиса", "Знаешь, ты не так плох, как я думала.", "alice");
        }
    }
    await new Promise(r => setTimeout(r, 3000));
    console.log("Calling endAct4 now");
    endAct4();
    return;
}
    
    if (scene.next) { await new Promise(r => setTimeout(r, scene.delay || 2000)); loadAct4Scene(scene.next); }
}

async function loadAct5Step(id) {
    if(!gameActive) return; waitingForAction = true; clearActions();
    const d = currentAct5Tree[id]; if(!d) return;
    
    // Игрок пишет первым
    if(d.playerFirst) {
        const text = typeof d.playerFirst === "function" ? d.playerFirst() : d.playerFirst;
        if(text) await addMessage(text, true, 200);
        await showTypingAndWait();
    }
    
    // Автосообщение игрока
    if(d.playerFirstAuto) {
        await addMessage(d.playerFirstAuto, true, 200);
        await showTypingAndWait();
    }
    
    // Сообщение Алисы
    if(d.girlMsg) {
        const text = typeof d.girlMsg === "function" ? d.girlMsg() : d.girlMsg;
        if(text) await addMessage(text, false, 200);
    }
    
    // Плохая концовка
    if(d.isBadEnd) {
        await new Promise(r => setTimeout(r, 1500));
        showEndScreen(typeof d.endText === "function" ? d.endText() : d.endText);
        return;
    }
    
    // Конец Акта 5
    if(d.isAct5End) {
        await new Promise(r => setTimeout(r, 1000));
        showEndScreen(typeof d.endText === "function" ? d.endText() : d.endText);
        return;
    }
    
    // Автопереход
    if(d.nextStep && (!d.options||d.options.length===0)) {
        await new Promise(r => setTimeout(r, 800));
        currentStep = d.nextStep;
        await loadAct5Step(currentStep);
        return;
    }
    
    // Определяем next
    if(d.next) {
        const nxt = typeof d.next === "function" ? d.next() : d.next;
        currentStep = nxt;
        await loadAct5Step(currentStep);
        return;
    }
    
    // Опции
    if(d.options) {
        const opts = typeof d.options === "function" ? d.options() : d.options;
        opts.forEach(o => {
            const btn = document.createElement("button"); btn.className = "action-btn"; btn.innerText = o.text;
            btn.onclick = async () => {
                if(!gameActive||waitingForAction) return; waitingForAction = true; clearActions();
                await addMessage(o.text, true, 0);
                if(o.relationDelta) { relation += o.relationDelta; updateRelationBadge(); saveGame(); }
                if(checkBlock()) return;
                await showTypingAndWait();
                const nxt = typeof o.nextStep === "function" ? o.nextStep() : o.nextStep;
                currentStep = nxt;
                await loadAct5Step(currentStep);
            }; actionsDiv.appendChild(btn);
        }); waitingForAction = false;
    } else waitingForAction = false;
}

    switch(act) {
        case 1: hadWalk = false; currentAct3Tree = null; currentAct5Tree = null; act5GfClaim = false; currentStep = "SN-START"; await loadStep(currentStep); break;
        case 2: currentAct3Tree = null; currentAct5Tree = null; await addMessage("🛠️ Переход к Акту 2...", true, 100); await new Promise(r => setTimeout(r, 500)); showAct2Modal(); break;
        case 3: currentAct5Tree = null; await addMessage("🛠️ Переход к Акту 3...", true, 100); await new Promise(r => setTimeout(r, 500)); showDayOverlay(); break;
        case 4: currentAct5Tree = null; startAct4(); break;
        case 5: currentAct5Tree = act5Scenes; currentStep = "A5-START"; await loadAct5Step(currentStep); break;
    }
};
window.debugReset = () => resetGame();

updateRelationBadge();

</script>
